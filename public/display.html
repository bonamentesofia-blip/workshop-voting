<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Rankings</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    text-align: center;
    padding: 24px 20px 16px;
    border-bottom: 2px solid #dc2626;
  }
  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
  }
  header p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 4px; letter-spacing: 1px; }
  .phase-badge {
    display: inline-block;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 8px;
    background: #dc2626;
    color: #fff;
  }

  /* PHASE 1 */
  #phase1 .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 24px 20px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .case-column {
    background: #111;
    border-radius: 16px;
    border: 1px solid #222;
    overflow: hidden;
  }
  .case-header {
    padding: 16px 20px;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .team-card {
    padding: 14px 20px;
    border-top: 1px solid #1a1a1a;
    transition: background 0.3s;
  }
  .team-card.rank-1 { background: rgba(220,38,38,0.08); }
  .team-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .rank-num {
    font-size: 1.1rem;
    font-weight: 800;
    width: 28px;
    text-align: center;
    color: rgba(255,255,255,0.25);
  }
  .rank-1 .rank-num { color: #dc2626; }
  .rank-2 .rank-num { color: rgba(255,255,255,0.6); }
  .rank-3 .rank-num { color: rgba(255,255,255,0.35); }
  .team-name {
    font-size: 1rem;
    font-weight: 600;
    flex: 1;
  }
  .team-score {
    font-size: 1.2rem;
    font-weight: 800;
    min-width: 40px;
    text-align: right;
  }
  .score-bar-bg {
    height: 4px;
    background: #222;
    border-radius: 2px;
    margin-left: 40px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  .dims {
    display: flex;
    gap: 12px;
    margin-top: 6px;
    margin-left: 40px;
  }
  .dim {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.35);
  }
  .dim span { color: rgba(255,255,255,0.7); font-weight: 600; }
  .no-votes {
    color: rgba(255,255,255,0.2);
    font-size: 0.8rem;
    font-style: italic;
  }

  /* PHASE 2 — PODIUM */
  #phase2 { display: none; padding: 20px 20px 40px; max-width: 1200px; margin: 0 auto; }
  #phase2 .subtitle { text-align: center; color: rgba(255,255,255,0.35); font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 40px; }

  .podium-wrap {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 16px;
    padding: 0 20px;
  }
  .podium-slot { flex: 1; max-width: 320px; display: flex; flex-direction: column; align-items: center; }

  .podium-card {
    width: 100%;
    border-radius: 20px 20px 0 0;
    padding: 28px 20px 24px;
    text-align: center;
    border: 1px solid #222;
    border-bottom: none;
    transition: all 0.6s ease;
    position: relative;
  }
  .podium-slot.p1 .podium-card { background: #1a0000; border-color: #dc2626; min-height: 340px; }
  .podium-slot.p2 .podium-card { background: #111; min-height: 260px; }
  .podium-slot.p3 .podium-card { background: #111; min-height: 200px; }

  .podium-medal { font-size: 2.8rem; margin-bottom: 12px; }
  .podium-name { font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 4px; line-height: 1.2; }
  .podium-slot.p1 .podium-name { font-size: 1.6rem; }
  .podium-case { font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }
  .podium-score { font-size: 2.8rem; font-weight: 900; line-height: 1; }
  .podium-slot.p1 .podium-score { font-size: 3.6rem; }
  .podium-score-label { font-size: 0.7rem; color: rgba(255,255,255,0.35); letter-spacing: 1px; margin-top: 4px; }

  .podium-dims { display: flex; justify-content: center; gap: 12px; margin-top: 16px; }
  .podium-dim { text-align: center; }
  .podium-dim-val { font-size: 1rem; font-weight: 700; }
  .podium-dim-lbl { font-size: 0.6rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.5px; }

  .podium-base {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: 900;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.6);
    border-radius: 0 0 12px 12px;
  }
  .podium-slot.p1 .podium-base { background: #dc2626; height: 56px; color: #fff; font-size: 1.5rem; }
  .podium-slot.p2 .podium-base { background: #333; height: 44px; }
  .podium-slot.p3 .podium-base { background: #222; height: 36px; }

  .waiting-text { color: rgba(255,255,255,0.2); font-size: 0.85rem; font-style: italic; margin-top: 12px; }

  .total-votes-badge {
    text-align: center;
    margin-top: 32px;
    color: rgba(255,255,255,0.35);
    font-size: 0.85rem;
    letter-spacing: 1px;
  }

  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity: 0.5; } }
</style>
</head>
<body>
<header>
  <h1>Live Rankings</h1>
  <p>WORKSHOP CHALLENGE 2026</p>
  <div class="phase-badge" id="phaseBadge">Phase 1 — Semifinal</div>
</header>

<div id="phase1">
  <div class="grid" id="rankingsGrid"></div>
</div>

<div id="phase2">
  <p class="subtitle">GRAND FINAL — LIVE VOTES</p>
  <div class="podium-wrap" id="podiumWrap"></div>
  <div class="total-votes-badge" id="totalVotesBadge"></div>
</div>

<script>
const socket = io();
socket.on('update', render);

function render(data) {
  const { phase, rankings, phase2Rankings, totalPhase2Votes } = data;

  document.getElementById('phase1').style.display = phase === 1 ? 'block' : 'none';
  document.getElementById('phase2').style.display = phase === 2 ? 'block' : 'none';
  document.getElementById('phaseBadge').textContent = phase === 1 ? 'Phase 1 — Semifinal' : 'Phase 2 — Grand Final';

  if (phase === 1) renderPhase1(rankings);
  else renderPhase2(phase2Rankings, totalPhase2Votes);
}

function renderPhase1(rankings) {
  const grid = document.getElementById('rankingsGrid');
  grid.innerHTML = rankings.map(bc => `
    <div class="case-column">
      <div class="case-header" style="color:${bc.color}; border-bottom: 3px solid ${bc.color}20">
        ${bc.name}
      </div>
      ${bc.teams.map((team, i) => `
        <div class="team-card rank-${i+1}">
          <div class="team-row">
            <div class="rank-num">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i+1}</div>
            <div class="team-name">${team.name}</div>
            <div class="team-score" style="color:${bc.color}">${team.avg > 0 ? team.avg.toFixed(1) : '—'}</div>
          </div>
          ${team.avg > 0 ? `
          <div class="score-bar-bg">
            <div class="score-bar-fill" style="width:${(team.avg/15*100)}%; background:${bc.color}"></div>
          </div>
          <div class="dims">
            <div class="dim">Innovation <span>${team.dimAvg.Innovation.toFixed(1)}</span></div>
            <div class="dim">Feasibility <span>${team.dimAvg.Feasibility.toFixed(1)}</span></div>
            <div class="dim">Impact <span>${team.dimAvg.Impact.toFixed(1)}</span></div>
          </div>` : `<div class="dims"><span class="no-votes">Waiting for votes...</span></div>`}
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderPhase2(rankings, total) {
  // podium order: 2nd (left), 1st (centre), 3rd (right)
  const slots = [
    { pos: 'p2', rank: 2, medal: '🥈', team: rankings[1] },
    { pos: 'p1', rank: 1, medal: '🥇', team: rankings[0] },
    { pos: 'p3', rank: 3, medal: '🥉', team: rankings[2] }
  ];

  document.getElementById('podiumWrap').innerHTML = slots.map(({ pos, rank, medal, team }) => {
    if (!team) return '';
    const hasVotes = team.avg > 0;
    const dims = hasVotes
      ? `<div class="podium-dims">
          ${['Innovation','Feasibility','Impact'].map(d => `
            <div class="podium-dim">
              <div class="podium-dim-val" style="color:${team.caseColor}">${team.dimAvg[d].toFixed(1)}</div>
              <div class="podium-dim-lbl">${d.slice(0,3)}</div>
            </div>`).join('')}
        </div>` : `<div class="waiting-text">Waiting for votes...</div>`;

    return `<div class="podium-slot ${pos}">
      <div class="podium-card">
        <div class="podium-medal">${medal}</div>
        <div class="podium-name">${team.name}</div>
        <div class="podium-case" style="color:${team.caseColor}">${team.caseName}</div>
        <div class="podium-score" style="color:${team.caseColor}">${hasVotes ? team.avg.toFixed(1) : '—'}</div>
        <div class="podium-score-label">avg score</div>
        ${dims}
      </div>
      <div class="podium-base">${rank}</div>
    </div>`;
  }).join('');

  document.getElementById('totalVotesBadge').textContent = total > 0 ? `${total} participant${total !== 1 ? 's' : ''} voted` : 'Waiting for votes...';
}
</script>
</body>
</html>
